# Azure Developer CLI (azd) configuration
# For more information, see: https://learn.microsoft.com/azure/developer/azure-developer-cli/

name: sqlbuildmanager
metadata:
  template: SqlBuildManager

# Infrastructure configuration
infra:
  provider: bicep
  path: infra
  module: main

# Environment variables shared across all services
# These can be overridden per environment using `azd env set`

# Hooks for custom scripts
hooks:
  # Pre-provision hook to set current user info and IP address
  preprovision:
    shell: pwsh
    run: ./infra/scripts/preprovision.ps1
    interactive: true

  # Post-provision hook to grant managed identity SQL permissions and generate settings files, build container images and Batch packages
  postprovision:
    shell: pwsh
    run: ./infra/scripts/postprovision.ps1
    interactive: true
